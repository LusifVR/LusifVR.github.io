<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>fxzv</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 { margin-top: 20px; }

    #box {
      width: 90%;
      max-width: 600px;
    }

    #chat {
      height: 350px;
      overflow-y: auto;
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
    }

    input {
      width: 100%;
      background: #2a2a2a;
      color: white;
    }

    button {
      background: #3a86ff;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    #idBox {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h2>fxzv</h2>

  <div id="box">
    <div id="idBox">Loading peer...</div>

    <input id="connectId" placeholder="Enter peer ID to connect" />
    <button onclick="connectPeer()">Connect</button>

    <div id="chat"></div>

    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMsg()">Send</button>
  </div>

  <!-- PeerJS -->
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    let conn;

    const peer = new Peer();

    peer.on('open', (id) => {
      document.getElementById("idBox").innerText =
        "Your ID: " + id;
    });

    peer.on('connection', (connection) => {
      conn = connection;
      setupConnection(conn);
    });

    function connectPeer() {
      const id = document.getElementById("connectId").value.trim();
      if (!id) return;

      conn = peer.connect(id);
      setupConnection(conn);
    }

    function setupConnection(connection) {
      connection.on('open', () => {
        addMsg("✔ Connected");
      });

      connection.on('data', (data) => {
        addMsg("User: " + data);
      });
    }

    function sendMsg() {
      const input = document.getElementById("msg");
      const text = input.value.trim();
      if (!text) return;

      addMsg("You: " + text);

      if (conn && conn.open) {
        conn.send(text);
      }

      input.value = "";
    }

    function addMsg(text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("msg").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMsg();
    });
  </script>
</body>
</html>
