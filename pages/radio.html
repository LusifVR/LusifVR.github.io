<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FQZ</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #050505 100%);
    color: #ddd;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    width: 100%;
}

.volume {
    display: flex;
    align-items: center;
}

#volumeSlider {
    transform: rotate(-90deg);
    width: 180px;
    accent-color: #ddd;
}

.center {
    text-align: center;
    min-width: 360px;
}

.freq {
    font-size: 56px;
    margin-bottom: 10px;
    letter-spacing: 3px;
}

.label {
    font-size: 12px;
    opacity: 0.5;
    margin-bottom: 20px;
}

input[type=range].tuner {
    width: 320px;
}

.meter {
    width: 12px;
    height: 200px;
    background: #222;
    position: relative;
    cursor: pointer;
}

.meter-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #0f0, #ff0, #f00);
}

.secret {
    background: rgb(27, 27, 27) !important;
    color: #000;
}
</style>
</head>

<body>

<div class="container">

    <div class="volume">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8">
    </div>

    <div class="center">
        <div class="freq" id="freq">100.0</div>
        <div class="label">MHz</div>

        <input class="tuner" id="slider" type="range" min="80" max="250" step="0.5" value="100">

        <div id="secretBox" style="display:none; margin-top:20px;">
            <a href="http://unitedhollowrepublic.com/fxzv">ENTER</a>
        </div>
    </div>

    <div class="meter" id="meter">
        <div class="meter-fill" id="meterFill"></div>
    </div>

</div>

<!-- AUDIO -->
<audio id="staticAudio" loop playsinline></audio>
<audio id="stationAudio" loop playsinline></audio>

<script>
const slider = document.getElementById("slider");
const volumeSlider = document.getElementById("volumeSlider");
const freqDisplay = document.getElementById("freq");
const meter = document.getElementById("meter");
const meterFill = document.getElementById("meterFill");
const secretBox = document.getElementById("secretBox");

const staticAudio = document.getElementById("staticAudio");
const stationAudio = document.getElementById("stationAudio");

const streamPool = [
    "https://stream.radioparadise.com/global-320",
    "https://stream.radioparadise.com/rock-320",
    "https://stream.radioparadise.com/mellow-320"
];

const staticNoise = "https://www.unitedhollowrepublic.com/audio/static.wav";

let stations = [];
let currentStation = "";
let secretUnlocked = false;
let audioStarted = false;

/* stations */
function generateStations() {
    stations = [];
    for (let f = 80; f <= 250; f += 0.5) {
        if (Math.random() < 0.25) {
            stations.push({
                freq: parseFloat(f.toFixed(1)),
                url: streamPool[Math.floor(Math.random() * streamPool.length)]
            });
        }
    }
}
generateStations();

/* snap */
function snap(v) {
    return Math.round(v * 2) / 2;
}

/* signal */
function nearestDist(freq) {
    let min = Infinity;
    for (let s of stations) {
        min = Math.min(min, Math.abs(freq - s.freq));
    }
    return min;
}

function getStrength(freq) {
    return Math.max(0, 1 - nearestDist(freq) / 1.5);
}

function updateSignal(freq) {
    const strength = getStrength(freq);
    meterFill.style.height = (strength * 100) + "%";
    return strength;
}

/* AUDIO FIX: static always audible */
function updateVolumes(strength) {
    const master = parseFloat(volumeSlider.value);

    const stationVol = strength * master;
    const staticVol = (0.35 + (1 - strength) * 0.65) * master;

    stationAudio.volume = stationVol;
    staticAudio.volume = Math.min(1, staticVol);
}

/* tuning */
function tune(raw) {
    if (secretUnlocked) return;

    const freq = snap(raw);
    slider.value = freq;
    freqDisplay.textContent = freq.toFixed(1);

    const strength = updateSignal(freq);

    const station = stations.find(s => s.freq === freq);

    if (station) {
        if (currentStation !== station.url) {
            stationAudio.src = station.url;
            stationAudio.play().catch(()=>{});
            currentStation = station.url;
        }
    } else {
        stationAudio.removeAttribute("src");
        currentStation = "";
    }

    updateVolumes(strength);
}

/* MUST START AUDIO ON USER GESTURE */
function startAudio() {
    if (audioStarted) return;
    audioStarted = true;

    staticAudio.src = staticNoise;
    staticAudio.loop = true;
    staticAudio.volume = 0.6;
    staticAudio.play().catch(()=>{});
}

/* secret */
meter.addEventListener("click", () => {
    if (Math.abs(parseFloat(slider.value) - 135.5) < 0.01) {
        secretUnlocked = true;
        document.body.style.background = "black";
        secretBox.style.display = "block";

        stationAudio.volume = 0;
        staticAudio.volume = 0;
    }
});

/* controls */
slider.addEventListener("input", () => {
    startAudio();
    tune(parseFloat(slider.value));
});

volumeSlider.addEventListener("input", () => {
    const strength = getStrength(parseFloat(slider.value));
    updateVolumes(strength);
});

/* init */
tune(parseFloat(slider.value));
</script>

</body>
</html>
